<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Loan Status Prediction Using Machine Learning</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-dark text-light">
  <div class="container mt-5">
    <h1 class="mb-4">Loan Status Prediction Using Machine Learning</h1>

    <form action="{{ url_for('home') }}" method="post" class="row g-3">
      <div class="col-md-6">
        <label class="form-label">Credit History</label>
        <input type="text" name="Credit_History" class="form-control" placeholder="1 or 0" required>
      </div>

      <div class="col-md-6">
        <label class="form-label">Married</label>
        <input type="text" name="Married" class="form-control" placeholder="Yes/No" required>
      </div>

      <div class="col-md-6">
        <label class="form-label">Coapplicant Income</label>
        <input type="number" step="0.01" name="CoapplicantIncome" class="form-control" placeholder="e.g. 1500" required>
      </div>

      <div class="col-md-6">
        <label class="form-label">Education</label>
        <input type="text" name="Education" class="form-control" placeholder="Graduate/Not Graduate" required>
      </div>

      <div class="col-md-6">
        <label class="form-label">Dependents</label>
        <input type="text" name="Dependents" class="form-control" placeholder="0/1/2/3+" required>
      </div>

      <div class="col-md-6">
        <label class="form-label">Gender</label>
        <input type="text" name="Gender" class="form-control" placeholder="Male/Female" required>
      </div>

      <div class="col-12">
        <button type="submit" class="btn btn-primary w-100">Predict</button>
      </div>
    </form>

    {% if prediction_text %}
      <div class="mt-4">
        <h4>Predicted Loan Status: {{ prediction_text }}</h4>
      </div>
    {% endif %}
  </div>
</body>
</html>
